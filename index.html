        // Parser pro LRC formát
        const lines = rawLrc.trim().split('\n').map(line => {
            const match = line.match(/\[(\d+):(\d+\.\d+)\] (.*)/);
            if (match) {
                const sec = parseInt(match[1]) * 60 + parseFloat(match[2]);
                return { time: sec, text: match[3] };
            }
            return null;
        }).filter(l => l);

        // Vykreslení textů do HTML
        lines.forEach((line, index) => {
            const div = document.createElement('div');
            div.classList.add('lyric-line');
            div.innerText = line.text;
            div.onclick = () => {
                audio.currentTime = line.time;
                if(audio.paused) audio.play();
                btn.innerText = 'II';
            };
            container.appendChild(div);
            line.el = div;
        });

        // Přepínání Play/Pause
        btn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                btn.innerText = 'II';
            } else {
                audio.pause();
                btn.innerText = '▶';
            }
        });

        // fuck gemini, but i couldnt do ts
        audio.addEventListener('timeupdate', () => {
            const curTime = audio.currentTime;
            
            lines.forEach((line, i) => {
                if (curTime >= line.time && (!lines[i+1] || curTime < lines[i+1].time)) {
                    // Odstranit aktivní třídu ze všech a přidat na aktuální
                    document.querySelectorAll('.lyric-line').forEach(l => l.classList.remove('active'));
                    line.el.classList.add('active');
                    
                    // Výpočet pozice pro scroll na střed kontejneru
                    const scrollPos = line.el.offsetTop - container.offsetTop - (container.clientHeight / 2) + (line.el.clientHeight / 2);
                    container.scrollTop = scrollPos;
                }
            });
        });

        // lemme go home
        audio.onended = () => { btn.innerText = '▶'; };
